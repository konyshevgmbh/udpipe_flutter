name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Shared Flutter version ────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.32.0'

jobs:

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Windows
        working-directory: example
        run: flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: example/build/windows/x64/runner/Release/
          retention-days: 7

  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Linux
        working-directory: example
        run: flutter build linux --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: example/build/linux/x64/release/bundle/
          retention-days: 7

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: example
        run: flutter pub get

      - name: Build macOS
        working-directory: example
        run: flutter build macos --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: example/build/macos/Build/Products/Release/
          retention-days: 7

  # ── Android ───────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: example
        run: flutter pub get

      - name: Build APK
        working-directory: example
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: example/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ── iOS ───────────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS (no-codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: example
        run: flutter pub get

      - name: Build iOS (no code signing)
        working-directory: example
        run: flutter build ios --release --no-codesign

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: example/build/ios/iphoneos/Runner.app
          retention-days: 7

  # ── Web ───────────────────────────────────────────────────────────────────────
  build-web:
    name: Web (WASM)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        # No submodules needed for web (WASM is pre-built)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: example
        run: flutter pub get

      - name: Build web
        working-directory: example
        run: flutter build web --base-href "/udpipe_flutter/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: example/build/web/
          retention-days: 7

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: example/build/web
