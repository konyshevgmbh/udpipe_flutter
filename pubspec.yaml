name: udpipe_flutter
description: Flutter library and demo app for UDPipe 1 — NLP tokenization, POS tagging and dependency parsing across 50+ languages, with native FFI on desktop/mobile and WebAssembly on the web.
version: 0.2.0
homepage: https://github.com/konyshevgmbh/udpipe_flutter
repository: https://github.com/konyshevgmbh/udpipe_flutter
issue_tracker: https://github.com/konyshevgmbh/udpipe_flutter/issues
topics:
  - nlp
  - ffi
  - text-processing
  - linguistics

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
